name: Gfxstream Presubmit

on:
  pull_request:
  push:
    branches-ignore:
      - main  # push events to main branch occur after PRs are merged, when the same checks were run

concurrency:
  # limits the workflow to a single run per branch/PR
  group: ${{ github.workflow }}-${{ github.ref }}
  # previous runs are cancelled when a new run is started
  cancel-in-progress: true

jobs:
  run-gfxstream-bazel-end2end-tests:
    runs-on: ubuntu-22.04
    steps:
    - name: Free disk space
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: true
    - name: Checkout repository
      uses: actions/checkout@a81bbbf8298c0fa03ea29cdc473d45769f953675 # aka v2
    - name: Install bazel
      run: sudo bash toolchain/bazel/install_bazel.sh
    - name: Install toolchain dependencies
      run: sudo bash toolchain/bazel/install_toolchain_dependencies.sh
    - name: Install runtime dependencies
      run: sudo apt-get install -y libvulkan1
    - name: Load cache config
      run: cat .config/cache-config.env >> $GITHUB_ENV
    - name: Mount Bazel cache
      uses: actions/cache@v4
      with:
        path: "~/bazel-disk-cache"
        key: ${{ runner.os }}-${{ runner.arch }}-bazel-disk-cache-${{ env.CACHE_VERSION }}-unit-test-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-bazel-disk-cache-${{ env.CACHE_VERSION }}-unit-test-${{ github.ref_name }}-
          ${{ runner.os }}-${{ runner.arch }}-bazel-disk-cache-${{ env.CACHE_VERSION }}-unit-test-main-
          ${{ runner.os }}-${{ runner.arch }}-bazel-disk-cache-${{ env.CACHE_VERSION }}-unit-test-
    - name: Build
      run: |
        bazel build ... \
          --disk_cache=$HOME/bazel-disk-cache \
          --graphics_drivers=gles_angle_vulkan_swiftshader \
          --verbose_failures
    - name: Run unit tests
      run: |
        bazel test \
          --disk_cache=$HOME/bazel-disk-cache \
          --graphics_drivers=gles_angle_vulkan_swiftshader \
          --test_output=streamed \
          --verbose_failures \
          common/end2end:gfxstream_end2end_tests
  run-gfxstream-bazel-end2end-tests-arm:
    runs-on: ubuntu-22.04-arm
    steps:
    - name: Free disk space
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: true
    - name: Checkout repository
      uses: actions/checkout@a81bbbf8298c0fa03ea29cdc473d45769f953675 # aka v2
    - name: Install bazel
      run: sudo bash toolchain/bazel/install_bazel.sh
    - name: Install toolchain dependencies
      run: sudo bash toolchain/bazel/install_toolchain_dependencies.sh
    - name: Install runtime dependencies
      run: sudo apt-get install -y libvulkan1
    - name: Load cache config
      run: cat .config/cache-config.env >> $GITHUB_ENV
    - name: Mount Bazel cache
      uses: actions/cache@v4
      with:
        path: "~/bazel-disk-cache"
        key: ${{ runner.os }}-${{ runner.arch }}-bazel-disk-cache-${{ env.CACHE_VERSION }}-unit-test-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-bazel-disk-cache-${{ env.CACHE_VERSION }}-unit-test-${{ github.ref_name }}-
          ${{ runner.os }}-${{ runner.arch }}-bazel-disk-cache-${{ env.CACHE_VERSION }}-unit-test-main-
          ${{ runner.os }}-${{ runner.arch }}-bazel-disk-cache-${{ env.CACHE_VERSION }}-unit-test-
    - name: Build
      run: |
        bazel build ... \
          --disk_cache=$HOME/bazel-disk-cache \
          --graphics_drivers=gles_angle_vulkan_swiftshader \
          --verbose_failures
  run-gfxstream-cmake-build:
    runs-on: ubuntu-22.04
    steps:
    - name: Free disk space
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: true
    - name: Checkout repository
      uses: actions/checkout@a81bbbf8298c0fa03ea29cdc473d45769f953675 # aka v2
    - name: Install toolchain dependencies
      run: sudo bash toolchain/cmake/install_toolchain_dependencies.sh
    - name: Configure Build
      run: |
        mkdir build && \
        cd build && \
        cmake .. -G Ninja
    - name: Build
      run: |
        cd build && \
        ninja
  run-gfxstream-meson-build:
    runs-on: ubuntu-22.04
    steps:
    - name: Free disk space
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: true
    - name: Checkout repository
      uses: actions/checkout@a81bbbf8298c0fa03ea29cdc473d45769f953675 # aka v2
    - name: Install toolchain dependencies
      run: sudo bash toolchain/meson/install_toolchain_dependencies.sh
    - name: Configure Build
      run: |
        meson setup \
          -Ddefault_library=static \
          -Dgfxstream-build=host \
          build
    - name: Build
      run: |
        meson compile -C build
